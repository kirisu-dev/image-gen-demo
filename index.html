<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #202124;
            color: white;
            text-align: center;
            margin-top: 80px;
        }

        textarea {
            width: 500px;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
        }

        img {
            margin-top: 20px;
            max-width: 512px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>AI Image Generator</h1>

    <textarea
        id="prompt"
        placeholder="Describe your image..."
    ></textarea>

    <br>

    <button onclick="generateImage()">
        Generate
    </button>

    <p id="status"></p>

    <img id="result" hidden>

    <script>

        function generateImage() {

            const prompt = document.getElementById("prompt").value;

            document.getElementById("status").innerText =
                "You entered:\n" + prompt;

            console.log(prompt);

        }

    </script>

</body>
</html>
