<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Image Generator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>AI Image Generator</h1>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">

            <div class="section">
                <div class="row">
                    <label>Character</label>
                    <select id="character"></select>
                    <textarea id="characterTags"></textarea>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <label>
                        <input type="checkbox" id="defaultOutfit" checked>
                        Default Outfit
                    </label>
                    <select id="outfit"></select>
                    <textarea id="outfitTags"></textarea>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <label>Location</label>
                    <select id="location"></select>
                    <textarea id="locationTags"></textarea>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <label>Time</label>
                    <select id="time"></select>
                    <textarea id="timeTags"></textarea>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <label>Angle</label>
                    <select id="angle"></select>
                    <textarea id="angleTags"></textarea>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <label>Body framing</label>
                    <select id="frame"></select>
                    <textarea id="frameTags"></textarea>
                </div>
            </div>

            <div class="section">
                <div class="row">
                    <label>Aspect Ratio</label>
                    <select id="aspectRatio"></select>
                </div>
            </div>

            <div class="section">
                <div class="row space-between">
                    <h3>Prompt</h3>
                    <button class="secondary" onclick="randomizePrompt()">
                        🎲 Random
                    </button>
                </div>
                <textarea id="prompt" placeholder="Describe what is happening..."></textarea>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <div class="section">
                <button class="secondary" onclick="previewPrompt()">Preview Prompt</button>
                <button id="generateButton" class="primary" onclick="generateImage()">Generate</button>
            </div>

            <div class="section">
                <img id="result" hidden>
            </div>
            
        </div>

    </div>

    <div id="promptModal" class="modal" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Prompt Preview</h2>
                <button onclick="closePromptPreview()">✕</button>
            </div>
            <pre id="fullPromptPreview"></pre>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
